name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"

jobs:
  # ── Lint & Type Check ────────────────────────────────────────────────────────
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the gitleaks step below can scan past commits, not
          # just the tip. A shallow clone would let a credential committed last
          # month sit undetected forever — which is the case that actually
          # matters here (see the DATABASE_URL rotation warnings in CLAUDE.md).
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Dependency audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

  # ── Unit Tests ───────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: vivah
          POSTGRES_PASSWORD: vivah
          POSTGRES_DB: smart_shaadi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations (test DB)
        run: pnpm --filter @smartshaadi/db exec drizzle-kit migrate
        env:
          DATABASE_URL: postgresql://vivah:vivah@localhost:5432/smart_shaadi_test

      - name: Run unit tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://vivah:vivah@localhost:5432/smart_shaadi_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test-secret-do-not-use-in-prod
          JWT_REFRESH_SECRET: test-refresh-secret-do-not-use
          BETTER_AUTH_SECRET: test-better-auth-secret-32-chars-min-len-aaaaaa
          NODE_ENV: test
          # env.ts validation exits the process unless mock mode is on (else it
          # demands real DAILY/RAZORPAY/MSG91/METRICS creds). Mock mode also
          # requires an explicit OTP value (no default).
          USE_MOCK_SERVICES: "true"
          MOCK_OTP_VALUE: "123456"

  # ── AI Service Tests (Python / pytest) ──────────────────────────────────────
  test-ai:
    name: AI Service Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install AI service deps
        working-directory: apps/ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        working-directory: apps/ai-service
        env:
          USE_MOCK_SERVICES: "true"
          ANTHROPIC_API_KEY: test-stub-not-real
          AI_SERVICE_INTERNAL_KEY: test-internal-key
          SENTRY_DSN: ""
          MONGODB_URI: mongodb://localhost:27017/smart_shaadi_test
          REDIS_URL: redis://localhost:6379
          # Skip HuggingFace model download (~1GB) and Anthropic SDK calls.
          # Tests that need them should be marked @pytest.mark.skipif or use
          # mock fixtures — runtime defaults to stub responses.
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: pytest -q --tb=short

  # ── AI Eval Suite — ML / deterministic (golden-set regression; PR only) ──────
  # REQUIRED gate. The 7 ML/deterministic features call the real ai-service
  # functions through a Python provider and need NO API keys, so they can block
  # merges deterministically. To finish promoting: add "AI Eval Suite (ML)" to
  # branch-protection required checks. See evals/README.md.
  eval-ml:
    name: AI Eval Suite (ML)
    runs-on: ubuntu-latest
    needs: test-ai
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ai-service functions back the ML/deterministic eval provider.
      - name: Install AI service deps
        working-directory: apps/ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # evals is standalone (not in the pnpm workspace).
      - name: Install eval harness
        working-directory: evals
        run: pnpm install --ignore-workspace

      - name: Run ML / deterministic evals
        working-directory: evals
        env:
          USE_MOCK_SERVICES: "true"
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: pnpm eval:ml

  # ── AI Eval Suite — LLM (golden-set regression; PR only) ─────────────────────
  # WARN-FIRST: continue-on-error so prompt/model drift surfaces as a warning
  # without blocking merges. The 4 LLM features call Anthropic via Helicone and
  # need repo secrets HELICONE_API_KEY + ANTHROPIC_API_KEY. Until those are set
  # the run skips cleanly (logged warning, exit 0). To promote once secrets land:
  # drop continue-on-error + add "AI Eval Suite (LLM)" to branch protection.
  eval-llm:
    name: AI Eval Suite (LLM)
    runs-on: ubuntu-latest
    needs: test-ai
    if: github.event_name == 'pull_request'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # evals is standalone (not in the pnpm workspace).
      - name: Install eval harness
        working-directory: evals
        run: pnpm install --ignore-workspace

      - name: Run LLM evals (skips when secrets absent)
        working-directory: evals
        env:
          HELICONE_API_KEY: ${{ secrets.HELICONE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$HELICONE_API_KEY" ] || [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::HELICONE_API_KEY / ANTHROPIC_API_KEY not set — skipping LLM evals (warn-first). Add the secrets to enable."
            exit 0
          fi
          pnpm eval:llm

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all apps
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: https://api.smartshaadi.co.in

  # ── E2E Tests (on PR only) ───────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.VERCEL_PREVIEW_URL }}

  # ── Deploy to Production (main branch only) ──────────────────────────────────
  # Vercel and Railway handle auto-deploys on push to main.
  # This job just creates a GitHub Release with notes.
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create deployment marker
        run: |
          echo "Deployment triggered for v${{ steps.version.outputs.version }}"
          echo "Vercel handles web app deploy automatically."
          echo "Railway handles API + AI service deploy automatically."
