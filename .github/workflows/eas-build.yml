# EAS Build workflow for Smart Shaadi mobile app (Phase 7.1)
# Runs on manual dispatch and on push to main when apps/mobile/** changes.
# Requires EXPO_TOKEN repo secret (configured after Expo enrolment).
name: EAS Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/eas-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.x

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build preview with EAS
        run: pnpm --filter @smartshaadi/mobile eas build --platform all --build-profile preview --non-interactive
