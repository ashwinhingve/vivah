<!--
  Neutral placeholder logo mark for seeded 8.2 service partners.

  Deliberately abstract: a seeded partner is a FICTIONAL business, so its mark
  must not resemble any real company's logo. Authored in-house from the Smart
  Shaadi design tokens.

  REPLACE WITH THE PARTNER'S OWN MARK WHEN A REAL PARTNER IS ONBOARDED.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img"
     aria-label="Placeholder partner logo">
  <defs>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7B2D42"/>
      <stop offset="100%" stop-color="#0E7C7B"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" rx="32" fill="#FEFAF6"/>
  <rect x="6" y="6" width="188" height="188" rx="28" fill="none"
        stroke="#C5A47E" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Two interlocking rings: partnership, not a specific brand. -->
  <g fill="none" stroke="url(#mark)" stroke-width="10" stroke-linecap="round">
    <circle cx="82"  cy="100" r="38"/>
    <circle cx="118" cy="100" r="38"/>
  </g>
  <circle cx="100" cy="100" r="5" fill="#C5A47E"/>
</svg>
