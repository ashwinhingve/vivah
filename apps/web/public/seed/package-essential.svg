<!--
  Placeholder hero for ESSENTIAL-tier seed packages.

  Authored in-house from the Smart Shaadi design tokens, NOT sourced from a
  stock library — seed inventory ships to production, so a third-party image
  would be a licensing exposure on a page real users can open.

  REPLACE WITH LICENSED PHOTOGRAPHY BEFORE PUBLIC LAUNCH.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img"
     aria-label="Placeholder venue image">
  <defs>
    <linearGradient id="essential" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0E7C7B"/>
      <stop offset="55%"  stop-color="#14615F"/>
      <stop offset="100%" stop-color="#7B2D42"/>
    </linearGradient>
    <linearGradient id="veil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FEFAF6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2E2E38" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#essential)"/>

  <!-- Suggestion of a mandap arch, not a depiction of any real venue. -->
  <g fill="none" stroke="#C5A47E" stroke-opacity="0.55" stroke-width="3">
    <path d="M320 520 L320 300 Q600 150 880 300 L880 520"/>
    <path d="M380 520 L380 330 Q600 210 820 330 L820 520"/>
    <circle cx="600" cy="238" r="14" stroke-opacity="0.8"/>
  </g>
  <g fill="#C5A47E" fill-opacity="0.35">
    <circle cx="240" cy="180" r="4"/><circle cx="960" cy="200" r="4"/>
    <circle cx="180" cy="420" r="3"/><circle cx="1020" cy="400" r="3"/>
  </g>

  <rect width="1200" height="675" fill="url(#veil)"/>
</svg>
