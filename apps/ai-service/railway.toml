# Smart Shaadi AI Service — Railway deploy config
#
# Deploys as a separate Railway service from `api`. The api service calls
# ai-service over the internal Railway network using AI_SERVICE_URL +
# AI_SERVICE_INTERNAL_KEY (env vars in api's service config).
#
# Root Directory must be set to `apps/ai-service` in Railway dashboard.
# Paths below are relative to that root directory.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'uvicorn src.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
