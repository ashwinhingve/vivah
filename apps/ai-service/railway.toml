# Smart Shaadi AI Service — Railway deploy config
#
# Deploys as a separate Railway service from `api`. The api service calls
# ai-service over the internal Railway network using AI_SERVICE_URL +
# AI_SERVICE_INTERNAL_KEY (env vars in api's service config).

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/ai-service/Dockerfile"
buildContext = "apps/ai-service"

[deploy]
startCommand = "uvicorn src.main:app --host 0.0.0.0 --port 8000"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "ai-service"

[services.deploy]
region = "ap-south-1"
