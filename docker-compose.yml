version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smart-shaadi-postgres
    environment:
      POSTGRES_USER: vivah
      POSTGRES_PASSWORD: vivah
      POSTGRES_DB: smart_shaadi
    ports:
      - "5432:5432"
    volumes:
      - smart-shaadi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vivah -d smart_shaadi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: smart-shaadi-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: vivah
      MONGO_INITDB_ROOT_PASSWORD: vivah
      MONGO_INITDB_DATABASE: smart_shaadi
    ports:
      - "27017:27017"
    volumes:
      - smart-shaadi-mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/smart_shaadi --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smart-shaadi-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - smart-shaadi-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Adminer (DB Browser) ─────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: smart-shaadi-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  smart-shaadi-postgres-data:
  smart-shaadi-mongo-data:
  smart-shaadi-redis-data:
